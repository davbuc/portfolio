kind = "web"
previewPath = "/"
title = "Artistic Portfolio"
version = "1.0.0"
id = "artifacts/artistic-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24143
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/artistic-portfolio run dev"

[services.env]
PORT = "24143"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/artistic-portfolio", "run", "build"]
publicDir = "artifacts/artistic-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
